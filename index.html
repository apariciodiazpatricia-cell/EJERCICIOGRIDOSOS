<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EJERCICIO GRID OSOS AMOROSOS</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="general-container">
  <main class="grid-layout">

    <h1 class="main-title">The Care Bears are back</h1>

    
      <div class="grid-item img-top-right">
        <img src="image/pinkbear.png" alt="osito rosa sobre la mesa">
      </div>
      <div class="grid-item item-1"><img src="image/rainbowbears.png" alt="ositos de fondo un arco iris"> 
        </div>
        <div class="grid-item item-2"><img src="image/funkobear2.png" alt="osito funko">
        </div>
        <div class="grid-item poster-center">
          <img src="image/bearscover.png" alt="portada de presentacion de tosos los osos amorosos , muy colorida">
        </div> 
<div class="grid-item item-3"><img src="image/friendlybears.png" alt="osito morado y osito leon amigos compartiendo">
      </div>
<div class="grid-item item-4"><img src="image/bluebear2.png" alt="osito pequeñito azul con ojos negros como botones">
</div>
<div class="grid-item item-5"><img src="image/bluebear.png" alt="osito de peluche azul sobre una mesa">
</div>
<div class="grid-item item-6"><img src="image/bearstogether.png" alt="ositos amigos sobre nubes y arco iris">
</div> 
  <div class="grid-item item-7"><img src="image/funkobear.png" alt="funko osito morado">
  </div> 
<div class="grid-item banner-bottom">
  <img src="image/bearglass.png" alt="vaso transparente muy vistoso de los osos amorosos especial para batidos y bebidas">
</div>


    </main>

</body>
</html>
